name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (pulls skaters from PyPI)
        run: pip install . pytest
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Continuity smoke (the v1 import must keep working)
        run: python -c "from timemachines import laplace, wald; assert callable(laplace) and callable(wald)"
